<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Relational Calculus - Dimensionless Deep Learning</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Official documentation for the Relational Calculus Framework.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Theme: Simple (Material-like) -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <style>
    :root {
      --theme-color: #1a73e8;
    }
    .sidebar-nav li > a {
      font-size: 14px;
    }
    .markdown-section {
      max-width: 950px;
      margin: 0 auto;
      padding: 30px 15px 40px;
    }
    /* Protezione per formule matematiche lunghe */
    .MathJax_Display {
      overflow-x: auto;
      overflow-y: hidden;
    }
  </style>

  <!-- MathJax Configuration -->
  <script type="text/x-mathjax-config">
    MathJax.Hub.Config({
      tex2jax: {
        inlineMath: [['$','$'], ['\\(','\\)']],
        displayMath: [['$$','$$'], ['\\[','\\]']],
        processEscapes: true,
        skipTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    });
  </script>
  <script src="//cdn.jsdelivr.net/npm/mathjax@2/MathJax.js?config=TeX-AMS-MML_HTMLorMML"></script>
</head>
<body>
  <div id="app">Loading documentation...</div>
  <script>
    window.$docsify = {
      name: 'Relational Calculus',
      repo: 'https://github.com/massimilianoconcas0-del/Relational_Loss_ML',
      
      // Navigation
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      
      // General Settings
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md',
        '/theory/white-paper': 'https://raw.githubusercontent.com/massimilianoconcas0-del/Relational_Loss_ML/main/WHITE_PAPER.md',
        '/research/emergent': 'https://raw.githubusercontent.com/massimilianoconcas0-del/Relational_Loss_ML/main/emergent_intelligence/emergent_paper_draft.md',
        '/research/green-ai': 'https://raw.githubusercontent.com/massimilianoconcas0-del/Relational_Loss_ML/main/green_AI_practitioner_guide/GREEN_AI_PAPER.md',
        '/research/quantum': 'https://raw.githubusercontent.com/massimilianoconcas0-del/Relational_Loss_ML/main/quantum_machine_learning/quantum_ML_paper.md',
        '/research/rna': 'https://raw.githubusercontent.com/massimilianoconcas0-del/Relational_Loss_ML/main/rna_sequencing/relational_RNA_paper.md',
        '/examples/core': 'https://raw.githubusercontent.com/massimilianoconcas0-del/Relational_Loss_ML/main/use_examples/1_core_architecture/README.md',
        '/examples/physics': 'https://raw.githubusercontent.com/massimilianoconcas0-del/Relational_Loss_ML/main/use_examples/2_physics_and_continuous_systems/README.md',
        '/examples/robotics': 'https://raw.githubusercontent.com/massimilianoconcas0-del/Relational_Loss_ML/main/use_examples/3_robotics_and_vision/README.md',
        '/examples/vision': 'https://raw.githubusercontent.com/massimilianoconcas0-del/Relational_Loss_ML/main/use_examples/3_robotics_and_vision/README.md',
        '/examples/nlp': 'https://raw.githubusercontent.com/massimilianoconcas0-del/Relational_Loss_ML/main/use_examples/nlp_and_enterprise_ai/README.md',
        '/examples/hep': 'https://raw.githubusercontent.com/massimilianoconcas0-del/Relational_Loss_ML/main/use_examples/hep/hpe_paper.md',
        '/examples/quantum-chem': 'https://raw.githubusercontent.com/massimilianoconcas0-del/Relational_Loss_ML/main/quantum_machine_learning/quantum_ML_paper.md',
        '/examples/tabular': 'https://raw.githubusercontent.com/massimilianoconcas0-del/Relational_Loss_ML/main/use_examples/tabular_data_xgboost/README.md'
      },
      
      // Plugins
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search documentation...',
        noData: 'No results!',
        depth: 6
      },
      
      plugins: [
        function(hook, vm) {
          hook.doneEach(function() {
            // Forza MathJax a scansionare la pagina dopo che Docsify ha caricato il contenuto
            if (typeof MathJax !== 'undefined') {
              MathJax.Hub.Queue(["Typeset", MathJax.Hub]);
            }
          });
        }
      ]
    }
  </script>
  
  <!-- Docsify Core -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <!-- Plugins -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>

  <!-- Prism Syntax Highlighting -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
