name: Deploy Documentation

on:
  push:
    branches:
      - main  # O il tuo branch predefinito

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3

      - name: Setup Python 🐍
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Sync Markdown Files 🔄
        run: python docs/sync_docs.py

      - name: Commit and Push changes 🚀
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f docs/modules/
          git commit -m "docs: auto-sync documentation modules [skip ci]" || echo "No changes to commit"
          git push origin main
